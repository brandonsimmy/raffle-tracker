<!DOCTYPE html>
<html>

<head>

    <title>Rev Comps Value Finder</title>

    <meta http-equiv="refresh" content="300">

    <style>

        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background: #f7f7f7;
        }

        h1 {
            margin-bottom: 5px;
        }

        .updated {
            margin-bottom: 20px;
            color: #666;
            font-size: 14px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th {
            background: #222;
            color: white;
            padding: 12px;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        tr:hover {
            background: #f2f2f2;
        }

        .high-score {
            font-weight: bold;
            color: green;
        }

        a {
            text-decoration: none;
            color: #0066cc;
        }

        a:hover {
            text-decoration: underline;
        }

    </style>

</head>

<body>

    <h1>Rev Comps Value Finder</h1>

    <div class="updated">
        Last updated: {{ last_updated }}
    </div>

    <table>

        <tr>
            <th>Score</th>
            <th>Unsold %</th>
            <th>Price</th>
            <th>Days Left</th>
            <th>Tickets</th>
            <th>Draw Date</th>
            <th>Competition</th>
        </tr>

        {% for c in competitions %}

        <tr>

            <td class="high-score">
                {{ c.score }}
            </td>

            <td>
                {{ c.unsold_pct }}%
            </td>

            <td>
                £{{ c.price }}
            </td>

            <td>
                {{ c.days_remaining }}
            </td>

            <td>
                {{ "{:,}".format(c.tickets) }}
            </td>

            <td>
                {{ c.draw_text }}
            </td>

            <td>
                <a href="{{ c.url }}" target="_blank">
                    {{ c.name }}
                </a>
            </td>

        </tr>

        {% endfor %}

    </table>

</body>

</html>
